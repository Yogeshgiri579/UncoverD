services:
  - type: static
    name: uncover-d-admin
    env: node
    buildCommand: npm ci && npm run build
    publishDirectory: dist
    headers:
      - path: "/*"
        headers:
          - key: "Cache-Control"
            value: "public, max-age=0, must-revalidate"
    envVars:
      - key: VITE_API_BASE_URL
        value: https://uncoverd.onrender.com/api
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
